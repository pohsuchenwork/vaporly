<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f49bbb"/>
      <stop offset="1" stop-color="#d75c86"/>
    </linearGradient>
    <linearGradient id="drop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe8ef"/>
      <stop offset="1" stop-color="#ffbfd1"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.35" cy="0.32" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="16"/>
      <feOffset dy="14" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="230" fill="url(#bg)"/>

  <g filter="url(#soft)">
    <path d="M512 236 C 592 372 700 494 700 612 A 188 188 0 1 1 324 612 C 324 494 432 372 512 236 Z" fill="url(#drop)"/>
  </g>

  <!-- water sheen / "filter" highlight -->
  <ellipse cx="452" cy="470" rx="70" ry="118" transform="rotate(-24 452 470)" fill="url(#sheen)"/>
  <circle cx="596" cy="700" r="30" fill="#ffffff" opacity="0.28"/>
</svg>
